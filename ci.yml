name: Bharat GPT 2.0 CI Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run Pytest
        env:
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test_secret_key
        run: |
          pytest backend/tests/

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Bandit (Security Linter)
        run: |
          pip install bandit
  deploy-blue-green:
    needs: [test, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Blue-Green / Canary Deploy Simulator
        run: |
          echo "Simulating Docker Tagging for current commit..."
          echo "Executing Health Check validation against staging prior to pivot..."
          echo "Initiating K8s rollout using RollingUpdate strategy."
          echo "Rollback script prepared via 'kubectl rollout undo deployment/bharatgpt-api' on failure."
