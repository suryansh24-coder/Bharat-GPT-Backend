apiVersion: apps/v1
kind: Deployment
metadata:
  name: bharatgpt-redis
  namespace: default
spec:
  replicas: 1 # Upgrade to Redis Cluster depending on load
  selector:
    matchLabels:
      app: bharatgpt-redis
  template:
    metadata:
      labels:
        app: bharatgpt-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: bharatgpt-redis
  namespace: default
spec:
  selector:
    app: bharatgpt-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
