apiVersion: apps/v1
kind: Deployment
metadata:
  name: bharatgpt-api
  namespace: default
  labels:
    app: bharatgpt-api
spec:
  replicas: 3 # Starting with 3 for HA
  selector:
    matchLabels:
      app: bharatgpt-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: bharatgpt-api
    spec:
      containers:
        - name: bharatgpt-api
          image: bharatgpt-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: bharatgpt-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bharatgpt-secrets
                  key: DB_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: bharatgpt-secrets
                  key: SECRET_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bharatgpt-secrets
                  key: OPENAI_API_KEY
            - name: SERPAPI_KEY
              valueFrom:
                secretKeyRef:
                  name: bharatgpt-secrets
                  key: SERPAPI_KEY
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: bharatgpt-api-svc
  namespace: default
spec:
  selector:
    app: bharatgpt-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
