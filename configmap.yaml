apiVersion: v1
kind: ConfigMap
metadata:
  name: bharatgpt-config
  namespace: default
data:
  ENVIRONMENT: "production"
  DATABASE_URL: "postgresql+asyncpg://postgres:$(DB_PASSWORD)@bharatgpt-postgres:5432/bharatgpt"
  REDIS_URL: "redis://bharatgpt-redis:6379/0"
  ALLOWED_ORIGINS: "*"
  LOG_LEVEL: "INFO"
