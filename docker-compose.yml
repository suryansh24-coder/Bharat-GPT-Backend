version: '3.8'

services:
  api:
    build: .
    container_name: bharatgpt_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:secure_password@db:5432/bharatgpt
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=super_secret_government_grade_key_change_in_production
      - ENVIRONMENT=production
    depends_on:
      - db
      - redis
    networks:
      - bharatgpt_network
    restart: always

  db:
    image: postgres:15-alpine
    container_name: bharatgpt_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secure_password
      - POSTGRES_DB=bharatgpt
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bharatgpt_network
    restart: always

  redis:
    image: redis:7-alpine
    container_name: bharatgpt_redis
    networks:
      - bharatgpt_network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: bharatgpt_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - bharatgpt_network
    restart: always

volumes:
  postgres_data:

networks:
  bharatgpt_network:
    driver: bridge
